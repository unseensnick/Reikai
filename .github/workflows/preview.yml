name: Build & publish preview

# Preview/nightly channel. Builds on every code push to the working branch (and on demand), signs with
# the repo keystore secrets (AGP-native), and publishes a non-prerelease to the unseensnick/Reikai-preview
# bucket so the in-app updater (preview builds check that repo) finds it. Cross-repo publish needs a PAT
# with Contents: write on Reikai-preview, stored as the PREVIEW_REPO_TOKEN secret on this repo.

on:
  push:
    branches:
      - main
    paths-ignore:
      # Non-app changes that never affect the built APK: docs, this/other CI workflows, and Claude
      # tooling. A push is skipped only when every changed file matches (a mixed app+docs push builds).
      - '**.md'
      - '.github/**'
      - '.claude/**'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Create a draft (test) preview release instead of publishing'
        required: false
        type: boolean
        default: false

concurrency:
  # A burst of pushes collapses to one build (the latest wins).
  group: preview
  cancel-in-progress: true

permissions:
  contents: read

env:
  PREVIEW_REPO: unseensnick/Reikai-preview

jobs:
  preview:
    name: Build signed preview
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Setup Android SDK
        run: ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0"

      - name: Copy CI gradle.properties
        run: |
          mkdir -p ~/.gradle
          cp .github/runner-files/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Run unit tests
        run: ./gradlew test

      - name: Build signed preview APKs
        run: ./gradlew assemblePreview -Penable-updater
        env:
          REIKAI_GITHUB_RELEASE: "true"
          storeFileBase64: ${{ secrets.SIGNING_KEY }}
          storePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyAlias: ${{ secrets.ALIAS }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Install parse-changelog
        uses: taiki-e/install-action@parse-changelog

      - name: Prepare release body
        env:
          GH_TOKEN: ${{ secrets.PREVIEW_REPO_TOKEN }}
        run: |
          set -e
          commit_count=$(git rev-list --count HEAD)
          echo "COMMIT_COUNT=$commit_count" >> "$GITHUB_ENV"

          # Resolve the previous preview's commit: preview tags are r<commitCount>, so the commit it was
          # cut from is HEAD~(count - prevCount).
          prev_ref=""
          prev_tag=$(gh release list --repo "$PREVIEW_REPO" --json tagName --limit 1 --jq 'select(length > 0) | .[0].tagName' || true)
          if [ -n "$prev_tag" ]; then
            back=$((commit_count - ${prev_tag#r}))
            if [ "$back" -ge 0 ] && git rev-parse -q --verify "HEAD~$back" >/dev/null 2>&1; then
              prev_ref="HEAD~$back"
            fi
          fi

          # Preview notes are the entries ADDED to CHANGELOG.md's [Unreleased] since the previous preview
          # (the running list would otherwise repeat every build). Diff the current [Unreleased] against
          # the same section as it stood at the previous preview's commit. When the changelog was NOT
          # touched since then, fall back to the commit subjects in that range so the notes still say
          # what changed.
          parse-changelog CHANGELOG.md Unreleased > /tmp/cur.txt 2>/dev/null || true
          : > /tmp/prev.txt
          if [ -n "$prev_ref" ]; then
            git show "$prev_ref:CHANGELOG.md" > /tmp/prevchg.md 2>/dev/null \
              && parse-changelog /tmp/prevchg.md Unreleased > /tmp/prev.txt 2>/dev/null || true
          fi

          new_lines=$(grep -vxF -f /tmp/prev.txt /tmp/cur.txt 2>/dev/null | sed '/^[[:space:]]*$/d' || true)
          {
            echo "RELEASE_BODY<<__EOF__"
            if [ -n "$new_lines" ]; then
              echo "### New since the last preview"
              echo ""
              echo "$new_lines"
            else
              commits=""
              if [ -n "$prev_ref" ]; then
                commits=$(git log --no-merges --format='- %s' "$prev_ref..HEAD" || true)
              fi
              if [ -n "$commits" ]; then
                echo "### Changes since the last preview"
                echo ""
                echo "$commits"
              else
                echo "No changelog or commit changes since the last preview."
              fi
            fi
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Rename APKs
        run: |
          set -e
          d=app/build/outputs/apk/preview
          mv "$d/app-universal-preview.apk"    "reikai-r${COMMIT_COUNT}.apk"
          mv "$d/app-arm64-v8a-preview.apk"    "reikai-arm64-v8a-r${COMMIT_COUNT}.apk"
          mv "$d/app-armeabi-v7a-preview.apk"  "reikai-armeabi-v7a-r${COMMIT_COUNT}.apk"
          mv "$d/app-x86-preview.apk"          "reikai-x86-r${COMMIT_COUNT}.apk"
          mv "$d/app-x86_64-preview.apk"       "reikai-x86_64-r${COMMIT_COUNT}.apk"

      - name: Publish preview release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          repository: ${{ env.PREVIEW_REPO }}
          token: ${{ secrets.PREVIEW_REPO_TOKEN }}
          tag_name: r${{ env.COMMIT_COUNT }}
          name: Reikai Preview r${{ env.COMMIT_COUNT }}
          body: |
            ${{ env.RELEASE_BODY }}

            > If you are unsure which to download, use `reikai-r${{ env.COMMIT_COUNT }}.apk` (universal).
          files: |
            reikai-r${{ env.COMMIT_COUNT }}.apk
            reikai-arm64-v8a-r${{ env.COMMIT_COUNT }}.apk
            reikai-armeabi-v7a-r${{ env.COMMIT_COUNT }}.apk
            reikai-x86-r${{ env.COMMIT_COUNT }}.apk
            reikai-x86_64-r${{ env.COMMIT_COUNT }}.apk
          draft: ${{ github.event.inputs.dry-run == 'true' }}
          prerelease: false

      - name: Prune old previews (keep newest 28)
        if: ${{ github.event.inputs.dry-run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.PREVIEW_REPO_TOKEN }}
        run: |
          set -e
          # Keep the 28 highest build numbers (tags are r<commitCount>). Sorting by the numeric tag,
          # not createdAt: a history-rewrite force-push can leave every release with the same createdAt,
          # which made the old date sort delete the just-published release instead of the oldest.
          gh release list --repo "$PREVIEW_REPO" --json tagName --limit 100 \
            | jq -r 'sort_by(.tagName | ltrimstr("r") | tonumber) | reverse | .[28:] | .[].tagName' \
            | while read -r tag; do
                [ -n "$tag" ] && gh release delete "$tag" --repo "$PREVIEW_REPO" --cleanup-tag --yes
              done
