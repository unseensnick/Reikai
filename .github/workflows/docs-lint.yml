name: Docs lint

# Enforces the CHANGELOG, ROADMAP, upstream-sync and feature-ports conventions (see .claude/rules/workflow.md:
# "After completing any code change", "Public-facing naming", "Roadmap & plans", "Syncing with
# Mihon"), plus the no-plan-codename rule for .kt comments (code-quality.md). Mirrors the local
# .githooks/pre-commit so PRs are checked even when the hook isn't installed.

on:
  pull_request:
    paths: ['CHANGELOG.md', 'ROADMAP.md', 'docs/dev/upstream-sync.md', 'docs/dev/feature-ports.md', '**/*.kt']
  push:
    branches: [main]
    paths: ['CHANGELOG.md', 'ROADMAP.md', 'docs/dev/upstream-sync.md', 'docs/dev/feature-ports.md', '**/*.kt']

permissions:
  contents: read

jobs:
  lint:
    name: Lint docs
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint CHANGELOG.md, ROADMAP.md, upstream-sync.md and feature-ports.md
        run: |
          set -u
          # Content-source names (adult + mainstream); genericize or use an approved shorthand
          # (EH / ExH / MD / CMK). Trackers (MangaUpdates, Shikimori, ...) are not sources; keep them.
          deny='e-hentai|ehentai|exhentai|nhentai|pururin|8muses|hentaifox|asmhentai|koharu|schalenetwork|mangadex|comick'
          fail=0

          # ===== CHANGELOG.md =====
          if names=$(grep -inE "$deny" CHANGELOG.md); then
            echo "::error::CHANGELOG.md names a content source; genericize it (see Public-facing naming)."
            echo "$names"
            fail=1
          fi
          issues=$(awk '
            /^## \[Unreleased\]/ { u=1; next }
            /^## \[/             { u=0 }
            !u                  { next }
            /^### /             { sec=$0; sub(/^### /,"",sec); next }
            /^\*\*/             { next }
            /^- / {
              if (length($0) > 320)
                print "  - over the length cap (>320 chars): " $0
              if (sec != "Other" && $0 !~ /^- \*\*[^*]+[.!?]\*\*/)
                print "  - needs a self-contained bold headline ending in . ! or ? (Other is exempt): " $0
            }
          ' CHANGELOG.md)
          if [ -n "$issues" ]; then
            echo "::error::CHANGELOG [Unreleased] entry issues:"
            echo "$issues"
            fail=1
          fi

          # ===== ROADMAP.md =====
          if names=$(grep -inE "$deny" ROADMAP.md); then
            echo "::error::ROADMAP.md names a content source; use an approved shorthand (EH / ExH / MD / CMK) or generic wording."
            echo "$names"
            fail=1
          fi
          if em=$(grep -n '—' ROADMAP.md); then
            echo "::error::ROADMAP.md contains an em dash; use commas, parentheses, periods or colons."
            echo "$em"
            fail=1
          fi
          if hn=$(grep -nE '(^|[^A-Za-z0-9])#[0-9]' ROADMAP.md); then
            echo "::error::ROADMAP.md has a bare '#N'; use 'Roadmap N' or owner/repo#N."
            echo "$hn"
            fail=1
          fi

          # ===== docs/dev/upstream-sync.md (content-source names are allowed: it is a dev record) =====
          if em=$(grep -n '—' docs/dev/upstream-sync.md); then
            echo "::error::upstream-sync.md contains an em dash; use commas, parentheses, periods or colons."
            echo "$em"
            fail=1
          fi
          if hn=$(grep -nE '(^|[^A-Za-z0-9])#[0-9]' docs/dev/upstream-sync.md); then
            echo "::error::upstream-sync.md has a bare '#N'; reference upstream as mihonapp/mihon#N."
            echo "$hn"
            fail=1
          fi

          # ===== docs/dev/feature-ports.md (content-source names are allowed: it is a dev record) =====
          if em=$(grep -n '—' docs/dev/feature-ports.md); then
            echo "::error::feature-ports.md contains an em dash; use commas, parentheses, periods or colons."
            echo "$em"
            fail=1
          fi
          if hn=$(grep -nE '(^|[^A-Za-z0-9])#[0-9]' docs/dev/feature-ports.md); then
            echo "::error::feature-ports.md has a bare '#N'; reference a ref's PR as owner/repo#N."
            echo "$hn"
            fail=1
          fi

          [ "$fail" -eq 0 ]

      - name: Lint .kt comments for plan/roadmap codenames
        run: |
          # No plan/roadmap codename markers in .kt comments (mirrors .githooks/pre-commit and
          # code-quality.md): Phase N, the P5 S5 shorthand, Y<n>, R<n> roadmap refs, Active #N, and a
          # plan-style Step N. Spares R8 (the code shrinker; R uses [0-79]), M3 (Material 3), and
          # colon-led algorithm steps ("Step 1:"). Whole-tree check, so anything that slips in fails.
          bad=$(git grep -nE '(//|/\*|^[[:space:]]*\*).*(Phase[[:space:]]*[0-9]|Active[[:space:]]*#[0-9]|\b[PY][0-9][a-z]?\b|\bR[0-79][a-z]?\b|Step [0-9])' -- '*.kt' | grep -vE 'Step [0-9]:' || true)
          if [ -n "$bad" ]; then
            echo "::error::a .kt comment carries a plan/roadmap codename marker; state the fact instead (see code-quality.md):"
            echo "$bad"
            exit 1
          fi
