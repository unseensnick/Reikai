name: Docs lint

# Enforces the CHANGELOG, ROADMAP and upstream-sync conventions (see .claude/rules/workflow.md:
# "After completing any code change", "Public-facing naming", "Roadmap & plans", "Syncing with
# Mihon"). Mirrors the local .githooks/pre-commit so PRs are checked even when the hook isn't
# installed.

on:
  pull_request:
    paths: ['CHANGELOG.md', 'ROADMAP.md', 'docs/dev/upstream-sync.md']
  push:
    branches: [main]
    paths: ['CHANGELOG.md', 'ROADMAP.md', 'docs/dev/upstream-sync.md']

permissions:
  contents: read

jobs:
  lint:
    name: Lint docs
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint CHANGELOG.md, ROADMAP.md and upstream-sync.md
        run: |
          set -u
          # Content-source names (adult + mainstream); genericize or use an approved shorthand
          # (EH / ExH / MD / CMK). Trackers (MangaUpdates, Shikimori, ...) are not sources; keep them.
          deny='e-hentai|ehentai|exhentai|nhentai|pururin|8muses|hentaifox|asmhentai|koharu|schalenetwork|mangadex|comick'
          fail=0

          # ===== CHANGELOG.md =====
          if names=$(grep -inE "$deny" CHANGELOG.md); then
            echo "::error::CHANGELOG.md names a content source; genericize it (see Public-facing naming)."
            echo "$names"
            fail=1
          fi
          issues=$(awk '
            /^## \[Unreleased\]/ { u=1; next }
            /^## \[/             { u=0 }
            !u                  { next }
            /^### /             { sec=$0; sub(/^### /,"",sec); next }
            /^\*\*/             { next }
            /^- / {
              if (length($0) > 320)
                print "  - over the length cap (>320 chars): " $0
              if (sec != "Other" && $0 !~ /^- \*\*[^*]+[.!?]\*\*/)
                print "  - needs a self-contained bold headline ending in . ! or ? (Other is exempt): " $0
            }
          ' CHANGELOG.md)
          if [ -n "$issues" ]; then
            echo "::error::CHANGELOG [Unreleased] entry issues:"
            echo "$issues"
            fail=1
          fi

          # ===== ROADMAP.md =====
          if names=$(grep -inE "$deny" ROADMAP.md); then
            echo "::error::ROADMAP.md names a content source; use an approved shorthand (EH / ExH / MD / CMK) or generic wording."
            echo "$names"
            fail=1
          fi
          if em=$(grep -n '—' ROADMAP.md); then
            echo "::error::ROADMAP.md contains an em dash; use commas, parentheses, periods or colons."
            echo "$em"
            fail=1
          fi
          if hn=$(grep -nE '(^|[^A-Za-z0-9])#[0-9]' ROADMAP.md); then
            echo "::error::ROADMAP.md has a bare '#N'; use 'Roadmap N' or owner/repo#N."
            echo "$hn"
            fail=1
          fi

          # ===== docs/dev/upstream-sync.md (content-source names are allowed: it is a dev record) =====
          if em=$(grep -n '—' docs/dev/upstream-sync.md); then
            echo "::error::upstream-sync.md contains an em dash; use commas, parentheses, periods or colons."
            echo "$em"
            fail=1
          fi
          if hn=$(grep -nE '(^|[^A-Za-z0-9])#[0-9]' docs/dev/upstream-sync.md); then
            echo "::error::upstream-sync.md has a bare '#N'; reference upstream as mihonapp/mihon#N."
            echo "$hn"
            fail=1
          fi

          [ "$fail" -eq 0 ]
